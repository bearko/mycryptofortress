<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCryptoFortress</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0b0d12;
        color: #e7eaf0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      /* SPEC-016: canvas をビューポート全体に広げる。dvh はモバイルブラウザの URL バー
         自動隠しに追従し、100vh の余白問題を避ける。 */
      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
      }
      #app canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
      }
      .loader {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 14px;
        color: #8a93a6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loader">Loading…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
